<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCBGZZY_DESIGN · 起手模板（report 骨架）</title>
<!-- 顺序固定：base → effects → theme-config -->
<link rel="stylesheet" href="base.css">
<link rel="stylesheet" href="effects.css">
<script src="theme-config.js"></script>
<style>
  /* 仅页面级布局；颜色全部用 token，不写死。无渐变。 */
  .summary{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg);
    padding:22px 24px; box-shadow:var(--shadow-sm); }
  .summary p{ font-size:var(--text-lead); color:var(--fg); max-width:none; line-height:1.7; }
  footer{ padding:28px 0; text-align:center; color:var(--fg-muted); font-size:var(--text-sm);
    border-top:1px solid var(--border); margin-top:var(--space-6); }
  /* 这是 report/dashboard 信息页骨架：结论 + 关键指标在最前，明细靠后。
     做 landing/活动页时再换成更视觉化的结构。 */
</style>
</head>
<body>

<!-- 工具层 · App Bar：移动端强制单行，滚动正文自动收缩让位 -->
<header class="ccbgzzy-appbar">
  <div class="ccbgzzy-appbar-inner">
    <div class="ccbgzzy-appbar-lead">
      <button class="ccbgzzy-iconbtn ccbgzzy-menu-btn" data-ccbgzzy-drawer="#nav-drawer" aria-label="打开菜单">☰</button>
      <div class="ccbgzzy-title-oneline" data-mobile-title="页面标题">页面标题占位<span class="sub">副标题 / 时间范围占位</span></div>
    </div>
    <div class="ccbgzzy-appbar-tools">
      <div data-ccbgzzy-theme-control></div>
    </div>
  </div>
</header>

<!-- 移动 drawer：菜单按钮打开，遮罩覆盖正文，关闭后不占宽度 -->
<nav class="ccbgzzy-mobile-drawer" id="nav-drawer" aria-label="页内导航">
  <div class="ccbgzzy-drawer-title">本页导航</div>
  <a class="ccbgzzy-drawer-link" href="#sec-conclusion">结论</a>
  <a class="ccbgzzy-drawer-link" href="#sec-kpi">关键指标</a>
  <a class="ccbgzzy-drawer-link" href="#sec-compare">分项对比</a>
  <a class="ccbgzzy-drawer-link" href="#sec-detail">明细</a>
</nav>

<div class="container" style="padding-top:var(--space-5);">

  <!-- Conclusion：结论前置（标题用 h2 级，不做大 hero） -->
  <section class="section" id="sec-conclusion" style="padding-top:0;">
    <span class="eyebrow">结论</span>
    <h2 style="margin:14px 0 12px;">一句话结论占位（写洞察，不写废话）</h2>
    <div class="summary" data-reveal>
      <p>用一两句话给出本页最重要的结论，最关键的 <span class="pop">数字</span> 可点亮一处。删掉本段，填入真实内容。</p>
    </div>
  </section>

  <!-- Key Metrics：关键指标紧跟结论 -->
  <section class="section" id="sec-kpi">
    <h3 class="section-title">关键指标</h3>
    <div class="grid grid-4">
      <div class="kpi" data-reveal><div class="kpi-label">指标一</div><div class="kpi-value num">128</div><div class="kpi-sub">较上期 +12</div></div>
      <div class="kpi" data-reveal><div class="kpi-label">指标二</div><div class="kpi-value num">86%</div><div class="kpi-sub">对照说明</div></div>
      <div class="kpi" data-reveal><div class="kpi-label">指标三</div><div class="kpi-value num">41</div><div class="kpi-sub"><span class="badge is-success">↑ 增长</span></div></div>
      <div class="kpi" data-reveal><div class="kpi-label">指标四（焦点）</div><div class="kpi-value is-pop num">57%</div><div class="kpi-sub"><span class="badge is-warning">需关注</span></div></div>
    </div>
  </section>

  <!-- Analysis：对比/排行（中密度用横条，不堆数字网格） -->
  <section class="section" id="sec-compare">
    <h3 class="section-title">分项对比</h3>
    <p class="section-desc">按某指标排序的对比占位。</p>
    <div data-reveal>
      <div style="display:grid;grid-template-columns:140px 1fr 56px;align-items:center;gap:16px;padding:12px 0;border-bottom:1px solid var(--border);">
        <div style="color:var(--title);font-weight:600;">条目一</div><div class="progress"><span style="width:92%"></span></div><div class="num" style="text-align:right;font-weight:600;color:var(--title);">92%</div></div>
      <div style="display:grid;grid-template-columns:140px 1fr 56px;align-items:center;gap:16px;padding:12px 0;border-bottom:1px solid var(--border);">
        <div style="color:var(--title);font-weight:600;">条目二</div><div class="progress"><span style="width:74%"></span></div><div class="num" style="text-align:right;font-weight:600;color:var(--title);">74%</div></div>
      <div style="display:grid;grid-template-columns:140px 1fr 56px;align-items:center;gap:16px;padding:12px 0;">
        <div style="color:var(--title);font-weight:600;">条目三</div><div class="progress"><span style="width:31%"></span></div><div class="num" style="text-align:right;font-weight:600;color:var(--title);">31%</div></div>
    </div>
  </section>

  <!-- Details：明细表靠后；长表用 .tall（表头吸顶） -->
  <section class="section" id="sec-detail">
    <h3 class="section-title">明细</h3>
    <div class="data-table tall" data-reveal>
      <table class="table table-compact">
        <thead><tr><th>名称</th><th class="num">数量</th><th class="num">占比</th><th>状态</th></tr></thead>
        <tbody>
          <tr><td data-mobile-title>条目一</td><td class="num" data-label="数量">128</td><td class="num" data-label="占比">92%</td><td data-label="状态"><span class="badge is-success">正常</span></td></tr>
          <tr><td data-mobile-title>条目二</td><td class="num" data-label="数量">86</td><td class="num" data-label="占比">74%</td><td data-label="状态"><span class="badge is-warning">待处理</span></td></tr>
          <tr><td data-mobile-title>条目三</td><td class="num" data-label="数量">24</td><td class="num" data-label="占比">31%</td><td data-label="状态"><span class="badge is-danger">异常</span></td></tr>
        </tbody>
      </table>
    </div>
  </section>

  <!-- Action -->
  <section class="section" style="border-bottom:none;">
    <div style="display:flex; gap:12px; flex-wrap:wrap;">
      <button class="btn btn-primary">主操作占位</button>
      <button class="btn btn-ghost">次操作占位</button>
    </div>
  </section>

  <footer>页面页脚占位 · CCBGZZY_DESIGN</footer>
</div>

<script>
  // 主题控件 / appbar / drawer / headroom 均由 theme-config.js 自动初始化。
  // 本页只需：① appbar 里放挂载点 <div data-ccbgzzy-theme-control>；② 菜单按钮 data-ccbgzzy-drawer。
  // 滚动入场
  var io = new IntersectionObserver(function (es) { es.forEach(function (e) { if (e.isIntersecting) { e.target.classList.add('is-visible'); io.unobserve(e.target); } }); }, { threshold: .14 });
  document.querySelectorAll('[data-reveal]').forEach(function (el) { io.observe(el); });
  // 三层水印
  CCBGZZY_initWatermark();
</script>
</body>
</html>
